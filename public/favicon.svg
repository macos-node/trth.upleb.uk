  <rect x="35" y="4"  width="25" height="25" rx="4" fill="#FFB347"/>
  <rect x="4"  y="35" width="25" height="25" rx="4" fill="#FF7849"/>
  <rect x="35" y="35" width="25" height="25" rx="4" fill="#FF7849"/>
</svg>
